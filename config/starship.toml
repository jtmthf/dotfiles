# Starship Configuration
# Modern, fast, and informative prompt

# Use custom format
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$java\
$ruby\
$golang\
$rust\
$docker_context\
$kubernetes\
$aws\
$gcloud\
$terraform\
$cmd_duration\
$line_break\
$character"""

# Wait 10 milliseconds for starship to check files under the current directory
scan_timeout = 10

# Disable the blank line at the start of the prompt
add_newline = false

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "red"
ahead = "⇡${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
behind = "⇣${count}"
deleted = "x"

[nodejs]
symbol = "⬢ "
style = "bold green"
detect_files = ["package.json", ".nvmrc"]

[python]
symbol = " "
style = "bold yellow"
detect_extensions = ["py"]
detect_files = ["requirements.txt", ".python-version", "pyproject.toml", "Pipfile"]

[java]
symbol = "☕ "
style = "red dimmed"

[ruby]
symbol = "💎 "
style = "bold red"

[golang]
symbol = " "
style = "bold cyan"

[rust]
symbol = " "
style = "bold red"

[docker_context]
symbol = " "
style = "blue bold"
only_with_files = true

[kubernetes]
symbol = "☸ "
style = "cyan bold"
disabled = false

[aws]
symbol = "  "
style = "bold yellow"

[gcloud]
symbol = "☁️ "
style = "bold blue"

[terraform]
symbol = "💠 "
style = "bold purple"

[cmd_duration]
min_time = 2_000
style = "yellow bold"
format = "took [$duration]($style)"

[username]
style_user = "bold dimmed blue"
show_always = false

[hostname]
ssh_only = true
style = "bold dimmed green"
