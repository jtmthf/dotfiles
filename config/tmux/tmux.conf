# tmux.conf — managed by dotfiles. See docs/tmux.md.

# ─── Prefix ───────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── Core options ─────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB,*-256color:RGB,alacritty:RGB,ghostty:RGB"
set -g mouse on
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
setw -q -g utf8 on

# ─── Notifications ────────────────────────────────────────────────────────
# Agents (Claude, etc.) emit \a when they need input. Surface that as:
#   - red ● on the window cell (handled in window-status-format below)
#   - macOS notification that jumps to the window when clicked
set -g monitor-bell on
set -g bell-action other      # alert on bell in any window except current
set -g visual-bell off
set -g monitor-activity off   # bell is enough signal; activity is noisy

set-hook -g alert-bell 'run-shell -b "command -v terminal-notifier >/dev/null 2>&1 && terminal-notifier -title \"#{session_name} · #{window_name}\" -message \"#{pane_title} wants you\" -sound Glass -group tmux-#{session_name}-#{window_index} -execute \"tmux switch-client -t #{session_name}:#{window_index}\" >/dev/null 2>&1"'

# Pane titles in border (set per-pane with `prefix + T`).
# Shows hostname by default — that's your cue to title it.
set -g pane-border-status top
set -g pane-border-format " #{pane_title}#{?pane_active, ●,} "

# ─── Pane / window keys ───────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind T command-prompt -p "pane title:" "select-pane -T '%%'"
bind r source-file "$XDG_CONFIG_HOME/tmux/tmux.conf" \; display-message "tmux.conf reloaded"

# Convenience: 3-pane split (current | top-right / bottom-right). Title them yourself.
bind S split-window -h -p 40 -c "#{pane_current_path}" \; split-window -v -p 50 -c "#{pane_current_path}" \; select-pane -t .1

# ─── Copy mode (vi) ───────────────────────────────────────────────────────
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-no-clear "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "pbcopy"

# ─── Popups ───────────────────────────────────────────────────────────────
bind C display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "claude"
bind c display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "claude --continue"
bind g display-popup -E -w 95% -h 95% -d "#{pane_current_path}" "lazygit"
bind ` display-popup -E -w 80% -h 80% -d "#{pane_current_path}"

# ─── Catppuccin Mocha (hand-rolled) ───────────────────────────────────────
set -g status-position top
set -g status-interval 2
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 80
set -g status-right-length 120

# Left: session badge + branch (env var from `cw`, falls back to git for ad-hoc sessions) + port
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#cba6f7]  #{?#{E:WORKTREE_BRANCH},#{E:WORKTREE_BRANCH},#(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null)}#{?#{E:DEV_PORT}, #[fg=#89b4fa]│ #[fg=#a6e3a1]:#{E:DEV_PORT},} #[fg=#89b4fa] "
set -g status-right "#[fg=#f5c2e7]#(whoami) #[fg=#89b4fa]│ #[fg=#f9e2af]%H:%M #[bg=#89b4fa,fg=#1e1e2e,bold] #h "

# Window cells: bell dot (red) when an agent pings, activity dot (yellow) for movement
set -g window-status-format         "#[fg=#6c7086] #I:#W#{?window_bell_flag,#[fg=#f38ba8] ●,}#{?window_activity_flag,#[fg=#f9e2af] ○,} "
set -g window-status-current-format "#[bg=#89b4fa,fg=#1e1e2e,bold] #I:#W#{?window_bell_flag, ●,} "
set -g window-status-bell-style     "fg=#f38ba8,bold"
set -g window-status-separator ""

set -g pane-border-style        "fg=#6c7086"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style            "bg=#313244,fg=#cdd6f4"
set -g message-command-style    "bg=#313244,fg=#cdd6f4"
set -g mode-style               "bg=#89b4fa,fg=#1e1e2e"

# ─── Plugins (TPM) ────────────────────────────────────────────────────────
# Install: prefix + I  ·  Update: prefix + U
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'

# Manual save/restore: prefix + Ctrl-s · prefix + Ctrl-r
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Initialize TPM (must be the very last line)
run "$XDG_CONFIG_HOME/tmux/plugins/tpm/tpm"
