# Mise Configuration
# Development environment management

[tools]
# Node.js
node = "lts"

# Python
python = "3.14"

# Java
java = "openjdk-25"

# Ruby
ruby = "3.2"
pnpm = "latest"

[env]
# Global environment variables
EDITOR = "nvim"
PAGER = "bat"

[settings]
# Auto-install tools
auto_install = true

idiomatic_version_file_enable_tools = ["node", "python", "java", "ruby"]

node.default_packages_file = "~/.config/mise/default-npm-packages"
python.default_packages_file = "~/.config/mise/default-python-packages"

[plugins]
# Additional plugins can be configured here
