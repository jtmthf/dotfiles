# Mise Configuration
# Development environment management

[tools]
# Node.js
node = "lts"

# Python
python = "3.14"

# Java
java = "openjdk-25"

# Ruby
ruby = "3.2"
pnpm = "latest"
bun = "latest"

# Global CLIs. Modern mise installs these as tools via the npm/pipx backends;
# the old `default_packages_file` mechanism is deprecated.
"npm:typescript-language-server" = "latest"
"npm:typescript" = "latest"
"npm:@playwright/cli" = "latest"
"pipx:crawl4ai" = "latest"

[env]
# Global environment variables
EDITOR = "nvim"
PAGER = "bat"

# Let uv defer to mise's managed Python instead of downloading its own.
UV_PYTHON_PREFERENCE = "only-system"

[settings]
# Auto-install tools
auto_install = true

idiomatic_version_file_enable_tools = ["node", "python", "java", "ruby"]

# Auto-create and source a uv-managed .venv when entering a project (needs uv).
python.uv_venv_auto = "create|source"

[plugins]
# Additional plugins can be configured here
